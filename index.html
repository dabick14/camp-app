<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Camp Admin</title>
    <script>
      // Apply the theme before first paint so there's no flash of the wrong
      // theme. Mirrors the storageKey used by next-themes' ThemeProvider.
      (function () {
        try {
          var stored = localStorage.getItem('camp-app-theme');
          var theme = stored === 'light' || stored === 'dark' ? stored : 'system';
          var isDark = theme === 'dark'
            || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark', isDark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div style="display:flex;height:100vh;align-items:center;justify-content:center;">
        <p style="font-family:system-ui,sans-serif;font-size:14px;color:#888;">Loading…</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
