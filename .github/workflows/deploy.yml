name: Deploy to Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Determine which paths changed so we only run what's needed.
  # On workflow_dispatch there's no diff, so both deploy jobs use
  # `|| github.event_name == 'workflow_dispatch'` to force a full deploy.
  filter:
    runs-on: ubuntu-latest
    outputs:
      hosting: ${{ steps.filter.outputs.hosting }}
      functions: ${{ steps.filter.outputs.functions }}
      firestoreRules: ${{ steps.filter.outputs.firestoreRules }}
      storageRules: ${{ steps.filter.outputs.storageRules }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            hosting:
              - '!(functions/**)'
            functions:
              - 'functions/**'
            firestoreRules:
              - 'firestore.rules'
              - 'firestore.indexes.json'
            storageRules:
              - 'storage.rules'

  # ── Job 1: Hosting ────────────────────────────────────────────────────────
  deploy-hosting:
    needs: filter
    if: needs.filter.outputs.hosting == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
        run: npm run build

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          channelId: live

  # ── Job 2: Cloud Functions ─────────────────────────────────────────────────
  deploy-functions:
    needs: filter
    if: needs.filter.outputs.functions == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install function dependencies
        run: npm ci
        working-directory: functions

      - name: Build functions
        run: npm run build
        working-directory: functions

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write service account key
        env:
          SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: echo "$SA_KEY" > /tmp/firebase-sa.json

      - name: Write functions .env
        env:
          WEB_API_KEY: ${{ secrets.WEB_API_KEY }}
        run: echo "WEB_API_KEY=$WEB_API_KEY" > functions/.env

      - name: Set BMS_API_KEY secret (Secret Manager)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
          BMS_API_KEY: ${{ secrets.BMS_API_KEY }}
        run: |
          printf '%s' "$BMS_API_KEY" | firebase functions:secrets:set BMS_API_KEY \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" --force --data-file -

      - name: Deploy Cloud Functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
        run: |
          firebase deploy --only functions \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
            --force

      - name: Clean up credentials
        if: always()
        run: rm -f /tmp/firebase-sa.json

  # ── Job 3: Firestore rules + indexes ────────────────────────────────────────
  # Without this, firestore.rules changes only ever take effect in the local
  # emulator (which reads the file straight off disk) and never reach
  # production unless someone remembers to deploy manually. That gap is what
  # let the tickets collection rule sit undeployed in prod after #15.
  deploy-firestore-rules:
    needs: filter
    if: needs.filter.outputs.firestoreRules == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write service account key
        env:
          SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: echo "$SA_KEY" > /tmp/firebase-sa.json

      - name: Deploy Firestore rules and indexes
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
        run: |
          firebase deploy --only firestore:rules,firestore:indexes \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
            --force

      - name: Clean up credentials
        if: always()
        run: rm -f /tmp/firebase-sa.json

  # ── Job 4: Storage rules ─────────────────────────────────────────────────────
  deploy-storage-rules:
    needs: filter
    if: needs.filter.outputs.storageRules == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write service account key
        env:
          SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: echo "$SA_KEY" > /tmp/firebase-sa.json

      - name: Deploy Storage rules
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/firebase-sa.json
        run: |
          firebase deploy --only storage \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
            --force

      - name: Clean up credentials
        if: always()
        run: rm -f /tmp/firebase-sa.json
